name: safepass
description: SafePass â€” Connected festival wristband app for safety, payments, and BAC monitoring.
publish_to: none
version: 3.2.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.38.4"

dependencies:
  flutter:
    sdk: flutter

  # Supabase (auth, database, realtime, storage)
  supabase_flutter: ^2.0.0

  # State management & navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0

  # Local storage & security
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  crypto: ^3.0.7

  # Hardware (BLE, NFC)
  flutter_blue_plus: ^2.2.1
  nfc_manager: ^4.1.1
  local_auth: ^3.0.1

  # Location & map
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # UI & animations
  flutter_animate: ^4.5.2
  lottie: ^3.3.2
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

  # Media & utilities
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  uuid: ^4.5.3
  intl: ^0.20.2

  # Monitoring & crash reporting (C4.1.2)
  sentry_flutter: ^8.14.2

  # Environments / flavors
  flutter_flavor: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^0.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/
